name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:

  # ── macOS (universal binary: arm64 + x86_64) ─────────────────────────────────
  build-macos:
    name: macOS (Universal)
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Build arm64
        run: cargo build --release --target aarch64-apple-darwin

      - name: Build x86_64
        run: cargo build --release --target x86_64-apple-darwin

      - name: Create universal binary
        run: |
          lipo -create \
            target/aarch64-apple-darwin/release/cdg-player \
            target/x86_64-apple-darwin/release/cdg-player \
            -output cdg-player-universal

      - name: Build .app bundle
        run: |
          APP="CDG Player.app"
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"

          cp cdg-player-universal "$APP/Contents/MacOS/cdg-player"

          cat > "$APP/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>cdg-player</string>
            <key>CFBundleIdentifier</key>
            <string>com.77seventy77.cdg-player</string>
            <key>CFBundleName</key>
            <string>CDG Player</string>
            <key>CFBundleDisplayName</key>
            <string>CDG Player</string>
            <key>CFBundleVersion</key>
            <string>1.0</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>CFBundleIconFile</key>
            <string>AppIcon</string>
            <key>NSHighResolutionCapable</key>
            <true/>
            <key>LSMinimumSystemVersion</key>
            <string>11.0</string>
          </dict>
          </plist>
          PLIST

          # Build .icns from Logo/CDG Logo.png using sips + iconutil
          mkdir -p AppIcon.iconset
          sips -z 16   16   "Logo/CDG Logo.png" --out AppIcon.iconset/icon_16x16.png
          sips -z 32   32   "Logo/CDG Logo.png" --out AppIcon.iconset/icon_16x16@2x.png
          sips -z 32   32   "Logo/CDG Logo.png" --out AppIcon.iconset/icon_32x32.png
          sips -z 64   64   "Logo/CDG Logo.png" --out AppIcon.iconset/icon_32x32@2x.png
          sips -z 128  128  "Logo/CDG Logo.png" --out AppIcon.iconset/icon_128x128.png
          sips -z 256  256  "Logo/CDG Logo.png" --out AppIcon.iconset/icon_128x128@2x.png
          sips -z 256  256  "Logo/CDG Logo.png" --out AppIcon.iconset/icon_256x256.png
          sips -z 512  512  "Logo/CDG Logo.png" --out AppIcon.iconset/icon_256x256@2x.png
          sips -z 512  512  "Logo/CDG Logo.png" --out AppIcon.iconset/icon_512x512.png
          sips -z 1024 1024 "Logo/CDG Logo.png" --out AppIcon.iconset/icon_512x512@2x.png
          iconutil -c icns AppIcon.iconset -o "$APP/Contents/Resources/AppIcon.icns"

      - name: Package
        run: zip -r "CDG-Player-macOS.zip" "CDG Player.app"

      - uses: actions/upload-artifact@v4
        with:
          name: CDG-Player-macOS
          path: CDG-Player-macOS.zip

  # ── Windows ───────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Convert PNG to ICO
        run: magick "Logo/CDG Logo.png" -define icon:auto-resize=256,128,64,48,32,16 "Logo/CDG Logo.ico"

      - name: Build
        run: cargo build --release

      - name: Package
        run: |
          New-Item -ItemType Directory -Path "CDG Player"
          Copy-Item "target\release\cdg-player.exe" "CDG Player\CDG Player.exe"
          Compress-Archive -Path "CDG Player" -DestinationPath "CDG-Player-Windows.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: CDG-Player-Windows
          path: CDG-Player-Windows.zip
