name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ── macOS (Universal: ARM + x86_64) ──────────────────────────────────────────
  build-macos:
    name: macOS (Universal)
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Build arm64
        run: cargo build --release --target aarch64-apple-darwin

      - name: Build x86_64
        run: cargo build --release --target x86_64-apple-darwin

      - name: Create universal binary
        run: |
          lipo -create \
            target/aarch64-apple-darwin/release/cdg-player \
            target/x86_64-apple-darwin/release/cdg-player \
            -output cdg-player-universal

      - name: Build .app bundle
        run: |
          APP="CDG Player.app"
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"

          cp cdg-player-universal "$APP/Contents/MacOS/cdg-player"
          chmod +x "$APP/Contents/MacOS/cdg-player"

          python3 - "$APP/Contents/Info.plist" << 'PYEOF'
          import sys
          path = sys.argv[1]
          content = """<?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>cdg-player</string>
            <key>CFBundleIdentifier</key>
            <string>com.77seventy77.cdg-player</string>
            <key>CFBundleName</key>
            <string>CDG Player</string>
            <key>CFBundleDisplayName</key>
            <string>CDG Player</string>
            <key>CFBundleVersion</key>
            <string>1.0</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>CFBundleIconFile</key>
            <string>AppIcon</string>
            <key>NSHighResolutionCapable</key>
            <true/>
            <key>LSMinimumSystemVersion</key>
            <string>11.0</string>
          </dict>
          </plist>
          """
          open(path, 'w').write('\n'.join(line.lstrip() for line in content.strip().splitlines()))
          PYEOF

          # Convert CDG Logo.png to AppIcon.icns
          mkdir -p AppIcon.iconset
          sips -z 16   16   "Logo/CDG Logo.png" --out AppIcon.iconset/icon_16x16.png
          sips -z 32   32   "Logo/CDG Logo.png" --out AppIcon.iconset/icon_16x16@2x.png
          sips -z 32   32   "Logo/CDG Logo.png" --out AppIcon.iconset/icon_32x32.png
          sips -z 64   64   "Logo/CDG Logo.png" --out AppIcon.iconset/icon_32x32@2x.png
          sips -z 128  128  "Logo/CDG Logo.png" --out AppIcon.iconset/icon_128x128.png
          sips -z 256  256  "Logo/CDG Logo.png" --out AppIcon.iconset/icon_128x128@2x.png
          sips -z 256  256  "Logo/CDG Logo.png" --out AppIcon.iconset/icon_256x256.png
          sips -z 512  512  "Logo/CDG Logo.png" --out AppIcon.iconset/icon_256x256@2x.png
          sips -z 512  512  "Logo/CDG Logo.png" --out AppIcon.iconset/icon_512x512.png
          sips -z 1024 1024 "Logo/CDG Logo.png" --out AppIcon.iconset/icon_512x512@2x.png
          iconutil -c icns AppIcon.iconset -o "$APP/Contents/Resources/AppIcon.icns"

      - name: Ad-hoc code sign
        run: codesign --deep --force --sign - "CDG Player.app"

      - name: Package
        run: zip -r "CDG-Player-macOS.zip" "CDG Player.app"

      - uses: actions/upload-artifact@v4.6.2
        with:
          name: CDG-Player-macOS
          path: CDG-Player-macOS.zip

  # ── Windows ───────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Convert PNG to ICO
        run: magick "Logo/CDG Logo.png" -define icon:auto-resize=256,128,64,48,32,16 "Logo/CDG Logo.ico"

      - name: Build
        run: cargo build --release

      - name: Package
        run: |
          New-Item -ItemType Directory -Path "CDG Player"
          Copy-Item "target\release\cdg-player.exe" "CDG Player\CDG Player.exe"
          Compress-Archive -Path "CDG Player" -DestinationPath "CDG-Player-Windows.zip"

      - uses: actions/upload-artifact@v4.6.2
        with:
          name: CDG-Player-Windows
          path: CDG-Player-Windows.zip

  # ── Linux (Flatpak) ───────────────────────────────────────────────────────────
  build-flatpak:
    name: Linux (Flatpak)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install flatpak and flatpak-builder
        run: |
          sudo apt-get update -q
          sudo apt-get install -y flatpak flatpak-builder xvfb
          sudo flatpak remote-add --if-not-exists flathub \
            https://dl.flathub.org/repo/flathub.flatpakrepo

      - name: Install Python deps for cargo generator
        run: pip3 install aiohttp toml tomlkit

      - name: Generate Cargo sources
        run: |
          curl -fsSL https://raw.githubusercontent.com/flatpak/flatpak-builder-tools/master/cargo/flatpak-cargo-generator.py \
            -o flatpak-cargo-generator.py
          python3 flatpak-cargo-generator.py Cargo.lock -o packaging/generated-sources.json

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: CDG-Player-Linux.flatpak
          manifest-path: packaging/com.77seventy77.CDGPlayer.yml
          cache-key: flatpak-builder-${{ github.sha }}
          upload-artifact: false

      - uses: actions/upload-artifact@v4.6.2
        with:
          name: CDG-Player-Flatpak
          path: CDG-Player-Linux.flatpak

  # ── Linux (AppImage) ──────────────────────────────────────────────────────────
  build-linux:
    name: Linux (AppImage)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libssl-dev libasound2-dev \
            fuse libfuse2 imagemagick

      - name: Build
        run: cargo build --release

      - name: Build AppImage
        run: |
          # Download linuxdeploy and AppImage plugin
          curl -fsSL https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage \
            -o linuxdeploy
          chmod +x linuxdeploy

          # Resize icon to 512x512 (linuxdeploy requires a standard resolution)
          convert "Logo/CDG Logo.png" -resize 512x512 icon-512.png

          # Set up AppDir structure
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/512x512/apps

          cp target/release/cdg-player AppDir/usr/bin/cdg-player
          cp packaging/com.77seventy77.CDGPlayer.desktop AppDir/usr/share/applications/
          cp icon-512.png AppDir/usr/share/icons/hicolor/512x512/apps/com.77seventy77.CDGPlayer.png

          # Create AppImage
          ARCH=x86_64 ./linuxdeploy \
            --appdir AppDir \
            --desktop-file AppDir/usr/share/applications/com.77seventy77.CDGPlayer.desktop \
            --icon-file icon-512.png \
            --output appimage

          mv CDG_Player-*.AppImage CDG-Player-Linux.AppImage

      - uses: actions/upload-artifact@v4.6.2
        with:
          name: CDG-Player-Linux
          path: CDG-Player-Linux.AppImage

  # ── Release (tag pushes only) ─────────────────────────────────────────────────
  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4.2.1
        with:
          name: CDG-Player-macOS

      - uses: actions/download-artifact@v4.2.1
        with:
          name: CDG-Player-Windows

      - uses: actions/download-artifact@v4.2.1
        with:
          name: CDG-Player-Linux

      - name: Create GitHub Release
        run: |
          gh release delete "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --yes 2>/dev/null || true
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "CDG Player ${{ github.ref_name }}" \
            --generate-notes \
            "CDG-Player-macOS.zip" \
            "CDG-Player-Windows.zip" \
            "CDG-Player-Linux.AppImage"
        env:
          GH_TOKEN: ${{ github.token }}
