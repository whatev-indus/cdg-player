name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  APP_VERSION: 1.0.4

jobs:

  # ── macOS (Universal: ARM + x86_64) ──────────────────────────────────────────
  build-macos:
    name: macOS (Universal)
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Build arm64
        run: cargo build --release --target aarch64-apple-darwin

      - name: Build x86_64
        run: cargo build --release --target x86_64-apple-darwin

      - name: Create universal binary
        run: |
          lipo -create \
            target/aarch64-apple-darwin/release/cdg-player \
            target/x86_64-apple-darwin/release/cdg-player \
            -output cdg-player-universal

      - name: Build .app bundle
        run: |
          APP="CD+G Player.app"
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"

          cp cdg-player-universal "$APP/Contents/MacOS/cdg-player"
          chmod +x "$APP/Contents/MacOS/cdg-player"

          python3 - "$APP/Contents/Info.plist" << 'PYEOF'
          import sys
          path = sys.argv[1]
          content = """<?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>cdg-player</string>
            <key>CFBundleIdentifier</key>
            <string>com.77seventy77.cdg-player</string>
            <key>CFBundleName</key>
            <string>CD+G Player</string>
            <key>CFBundleDisplayName</key>
            <string>CD+G Player</string>
            <key>CFBundleVersion</key>
            <string>${{ env.APP_VERSION }}</string>
            <key>CFBundleShortVersionString</key>
            <string>${{ env.APP_VERSION }}</string>
            <key>CFBundleIconFile</key>
            <string>AppIcon</string>
            <key>NSHighResolutionCapable</key>
            <true/>
            <key>LSMinimumSystemVersion</key>
            <string>11.0</string>
          </dict>
          </plist>
          """
          open(path, 'w').write('\n'.join(line.lstrip() for line in content.strip().splitlines()))
          PYEOF

          # Convert CDG Logo.png to AppIcon.icns
          mkdir -p AppIcon.iconset
          sips -z 16   16   "Logo/CDG Logo.png" --out AppIcon.iconset/icon_16x16.png
          sips -z 32   32   "Logo/CDG Logo.png" --out AppIcon.iconset/icon_16x16@2x.png
          sips -z 32   32   "Logo/CDG Logo.png" --out AppIcon.iconset/icon_32x32.png
          sips -z 64   64   "Logo/CDG Logo.png" --out AppIcon.iconset/icon_32x32@2x.png
          sips -z 128  128  "Logo/CDG Logo.png" --out AppIcon.iconset/icon_128x128.png
          sips -z 256  256  "Logo/CDG Logo.png" --out AppIcon.iconset/icon_128x128@2x.png
          sips -z 256  256  "Logo/CDG Logo.png" --out AppIcon.iconset/icon_256x256.png
          sips -z 512  512  "Logo/CDG Logo.png" --out AppIcon.iconset/icon_256x256@2x.png
          sips -z 512  512  "Logo/CDG Logo.png" --out AppIcon.iconset/icon_512x512.png
          sips -z 1024 1024 "Logo/CDG Logo.png" --out AppIcon.iconset/icon_512x512@2x.png
          iconutil -c icns AppIcon.iconset -o "$APP/Contents/Resources/AppIcon.icns"

      - name: Ad-hoc code sign
        run: codesign --deep --force --sign - "CD+G Player.app"

      - name: Package
        run: zip -r "CD+G Player_macOS_v${{ env.APP_VERSION }}.zip" "CD+G Player.app"

      - uses: actions/upload-artifact@v4.6.2
        with:
          name: CD+G Player_macOS_v${{ env.APP_VERSION }}.zip
          path: CD+G Player_macOS_v${{ env.APP_VERSION }}.zip

  # ── Windows ───────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Convert PNG to ICO
        run: magick "Logo/CDG Logo.png" -define icon:auto-resize=256,128,64,48,32,16 "Logo/CDG Logo.ico"

      - name: Build
        run: cargo build --release

      - name: Install ffmpeg
        shell: pwsh
        run: |
          choco install ffmpeg --yes --no-progress
          New-Item -ItemType Directory -Force -Path bundle | Out-Null
          $ffmpegExe = Get-ChildItem "C:\ProgramData\chocolatey\lib" -Recurse -Filter ffmpeg.exe |
            Where-Object { $_.FullName -notmatch '\\bin\\' } |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $ffmpegExe) {
            throw "Could not locate installed ffmpeg.exe"
          }
          Copy-Item $ffmpegExe "bundle\ffmpeg.exe"

      - name: Install WiX Toolset
        run: |
          choco install wixtoolset --yes --no-progress
          $wixBin = Join-Path ${env:ProgramFiles(x86)} "WiX Toolset v3.11\bin"
          $wixBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build MSI
        shell: pwsh
        run: |
          @'
          <?xml version="1.0" encoding="UTF-8"?>
          <Wix xmlns="http://schemas.microsoft.com/wix/2006/wi">
            <Product
              Id="*"
              Name="CD+G Player"
              Language="1033"
              Version="${{ env.APP_VERSION }}"
              Manufacturer="77seventy77"
              UpgradeCode="7F1794FA-5FC2-4F83-A0A0-6D7C7F9F1F04">
              <Package InstallerVersion="500" Compressed="yes" InstallScope="perMachine" Platform="x64" />
              <MajorUpgrade DowngradeErrorMessage="A newer version of CD+G Player is already installed." />
              <MediaTemplate EmbedCab="yes" />
              <Icon Id="AppIcon" SourceFile="Logo\CDG Logo.ico" />
              <Property Id="ARPPRODUCTICON" Value="AppIcon" />

              <Directory Id="TARGETDIR" Name="SourceDir">
                <Directory Id="ProgramFiles64Folder">
                  <Directory Id="INSTALLFOLDER" Name="CD+G Player">
                    <Component Id="MainExecutable" Guid="7580931F-26BF-4A3E-8F28-E57FEA5A4C54" Win64="yes">
                      <File Id="CdgPlayerExe" Source="target\release\cdg-player.exe" KeyPath="yes" />
                    </Component>
                    <Component Id="BundledFfmpeg" Guid="5F4F4B7B-C031-4A12-8E11-E29E332271D0" Win64="yes">
                      <File Id="BundledFfmpegExe" Source="bundle\ffmpeg.exe" KeyPath="yes" />
                    </Component>
                  </Directory>
                </Directory>
                <Directory Id="ProgramMenuFolder">
                  <Directory Id="ApplicationProgramsFolder" Name="CD+G Player">
                    <Component Id="ApplicationShortcut" Guid="A814507A-F7C2-48BD-83B0-6FEA098E53FE" Win64="yes">
                      <Shortcut
                        Id="ApplicationStartMenuShortcut"
                        Name="CD+G Player"
                        Description="CD+G and CD+EG karaoke disc player"
                        Target="[INSTALLFOLDER]cdg-player.exe"
                        WorkingDirectory="INSTALLFOLDER" />
                      <RemoveFolder Id="ApplicationProgramsFolder" On="uninstall" />
                      <RegistryValue Root="HKLM" Key="Software\77seventy77\CDGPlayer" Name="installed" Type="integer" Value="1" KeyPath="yes" />
                    </Component>
                  </Directory>
                </Directory>
              </Directory>

              <Feature Id="Complete" Level="1">
                <ComponentRef Id="MainExecutable" />
                <ComponentRef Id="BundledFfmpeg" />
                <ComponentRef Id="ApplicationShortcut" />
              </Feature>
            </Product>
          </Wix>
          '@ | Set-Content -Path installer.wxs

          candle installer.wxs
          light -sval installer.wixobj -o "CD+G Player_Windows_v${{ env.APP_VERSION }}.msi"

      - uses: actions/upload-artifact@v4.6.2
        with:
          name: CD+G Player_Windows_v${{ env.APP_VERSION }}.msi
          path: CD+G Player_Windows_v${{ env.APP_VERSION }}.msi

  # ── Linux (AppImage) ──────────────────────────────────────────────────────────
  build-linux:
    name: Linux (AppImage)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libssl-dev libasound2-dev \
            fuse libfuse2 imagemagick

      - name: Build
        run: cargo build --release

      - name: Build AppImage
        run: |
          # Download linuxdeploy and AppImage plugin
          curl -fsSL https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage \
            -o linuxdeploy
          chmod +x linuxdeploy

          # Resize icon to 512x512 (linuxdeploy requires a standard resolution)
          convert "Logo/CDG Logo.png" -resize 512x512 icon-512.png

          # Set up AppDir structure
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/512x512/apps

          cp target/release/cdg-player AppDir/usr/bin/cdg-player
          cp packaging/com.77seventy77.CDGPlayer.desktop AppDir/usr/share/applications/
          cp icon-512.png AppDir/usr/share/icons/hicolor/512x512/apps/com.77seventy77.CDGPlayer.png

          # Create AppImage
          ARCH=x86_64 ./linuxdeploy \
            --appdir AppDir \
            --desktop-file AppDir/usr/share/applications/com.77seventy77.CDGPlayer.desktop \
            --icon-file icon-512.png \
            --output appimage

          mv ./*.AppImage "CD+G Player_Linux_v${{ env.APP_VERSION }}.AppImage"

      - uses: actions/upload-artifact@v4.6.2
        with:
          name: CD+G Player_Linux_v${{ env.APP_VERSION }}.AppImage
          path: CD+G Player_Linux_v${{ env.APP_VERSION }}.AppImage

  # ── Release (tag pushes only) ─────────────────────────────────────────────────
  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4.2.1
        with:
          name: CD+G Player_macOS_v${{ env.APP_VERSION }}.zip

      - uses: actions/download-artifact@v4.2.1
        with:
          name: CD+G Player_Windows_v${{ env.APP_VERSION }}.msi

      - uses: actions/download-artifact@v4.2.1
        with:
          name: CD+G Player_Linux_v${{ env.APP_VERSION }}.AppImage

      - name: Create GitHub Release
        run: |
          gh release delete "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --yes 2>/dev/null || true
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "CD+G Player ${{ github.ref_name }}" \
            --generate-notes \
            "CD+G Player_macOS_v${{ env.APP_VERSION }}.zip" \
            "CD+G Player_Windows_v${{ env.APP_VERSION }}.msi" \
            "CD+G Player_Linux_v${{ env.APP_VERSION }}.AppImage"
        env:
          GH_TOKEN: ${{ github.token }}
